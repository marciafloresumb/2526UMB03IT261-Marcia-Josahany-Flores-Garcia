<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container">

    <div class="row">
        <div class="col-md-3"></div>
        <div class="col-md-3"></div>
        <div class="col-md-3"></div>
        <div class="col-md-3"></div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="js/libs/angular.min.js"></script>
<script src="js/modulos/app.module.js"></script>
  <div class="container py-5">
        <div class="card custom-card">
            <div class="card-body p-4">
                <h3 class="card-title fw-bold mb-4">Rutas</h3>
                <hr class="mb-4"> <form id="rutaForm">
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label for="fecha_inicio" class="form-label">Fecha de inicio</label>
                            <input type="date" class="form-control" id="fecha_inicio" placeholder="dd/mm/aaaa">
                        </div>
                        <div class="col-md-4">
                            <label for="fecha_conclusion" class="form-label">Fecha de conclusión</label>
                            <input type="date" class="form-control" id="fecha_conclusion" placeholder="dd/mm/aaaa">
                        </div>
                        <div class="col-md-4">
                            <label for="proveedor" class="form-label">Proveedor</label>
                            <select class="form-select" id="proveedor">
                                <option selected>Seleccione un proveedor</option>
                                <option value="1">Proveedor 1</option>
                                <option value="2">Proveedor 2</option>
                                <option value="3">Proveedor 3</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label for="auto" class="form-label">Auto</label>
                            <select class="form-select" id="auto">
                                <option selected>Seleccione un auto</option>
                                <option value="1">nissan</option>
                                <option value="2">tsuru</option>
                                <option value="3">tesla</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="driver" class="form-label">Driver</label>
                            <select class="form-select" id="driver">
                                <option selected>Seleccione un driver</option>
                                <option value="1">Driver 1</option>
                                <option value="2">Driver 2</option>
                                <option value="3">Driver 3</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="id_ruta" class="form-label">Id ruta</label>
                            <input type="text" class="form-control" id="id_ruta" placeholder="Id ruta">
                        </div>
                    </div>

                    <div class="row mt-4 justify-content-center gap-2">
                        <div class="col-auto">
                            <button type="submit" class="btn btn-custom-green w-100">Buscar</button>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn btn-custom-blue w-100" id="btnNuevaRuta">Nueva ruta</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card-footer bg-transparent custom-progress-container pb-3 text-center">
                 <div class="custom-progress-bar mx-auto w-100"></div>
                <div class="page-version">
                    [ 1.8 ]
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
    
            const fechaInicioInput = document.getElementById('fecha_inicio');
            const fechaConclusionInput = document.getElementById('fecha_conclusion');
            const today = new Date().toISOString().split('T')[0];
            fechaInicioInput.value = today;

            
            document.getElementById('rutaForm').addEventListener('submit', function(event) {
                event.preventDefault(); 
                
                const formData = {
                    fechaInicio: fechaInicioInput.value,
                    fechaConclusion: fechaConclusionInput.value,
                    proveedor: document.getElementById('proveedor').value,
                    auto: document.getElementById('auto').value,
                    driver: document.getElementById('driver').value,
                    idRuta: document.getElementById('id_ruta').value
                };
                
                console.log('Búsqueda iniciada con:', formData);
                alert('Búsqueda iniciada con los parámetros del formulario.');
            });

            // Manejar el clic en "Nueva ruta"
            document.getElementById('btnNuevaRuta').addEventListener('click', function() {
                alert('Abriendo modal para nueva ruta (demostración).');
                // Aquí podrías abrir un modal, redirigir a otra página, etc.
            });
        });
    </script>

</body>
</html>
