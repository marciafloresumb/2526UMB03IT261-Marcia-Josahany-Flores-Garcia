<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Práctica JavaScript</title>
</head>
<body>

<h1>Práctica de JavaScript</h1>

<button onclick="mostrarAlerta()">1. Mostrar alerta</button>
<button onclick="mostrarVariable()">2. Mostrar variable</button>
<button onclick="sumar()">3. Sumar variables</button>
<button onclick="serFeliz()">4. Ser feliz </button>
<button onclick="validarMayor()">5. Validar > 10</button>
<button onclick="parImpar()">6. Par o impar</button>
<button onclick="forLoop()">7. For 1 al 10</button>
<button onclick="whileLoop()">8. While 10 al 1</button>
<button onclick="mostrarFuncion()">9. Función mensaje</button>
<button onclick="sumarFuncion()">10. Función suma</button>
<button onclick="arreglo()">11. Arreglo</button>
<button onclick="recorrerArreglo()">12. Recorrer arreglo</button>
<button onclick="mostrarObjeto()">13 y 14. Objeto</button>
<button onclick="cambiarTexto()">16. Cambiar texto</button>
<button onclick="cambiarColor()">17. Cambiar color</button>
<button onclick="validarCampo()">18. Validar campo</button>
<button onclick="contador()">19. Contador</button>

<p id="texto">Texto original</p>

<input type="text" id="campo" placeholder="Escribe algo">
<p id="contador">0</p>

<script>

// 1
function mostrarAlerta(){
    alert("Hola mundo soy Josahany");
}

// 2
function mostrarVariable(){
    let nombre = "Hany";
    console.log(nombre);
}

// 3
function sumar(){
    let a = 5;
    let b = 3;
    console.log("Suma:", a + b);
}

// 4
function serFeliz(){
    alert("Sé feliz ");
}

// 5
function validarMayor(){
    let num = prompt("Ingresa un número:");
    if(num > 10){
        alert("Es mayor a 10");
    } else {
        alert("No es mayor a 10");
    }
}

// 6
function parImpar(){
    let num = prompt("Ingresa un número:");
    if(num % 2 == 0){
        alert("Es par");
    } else {
        alert("Es impar");
    }
}

// 7
function forLoop(){
    for(let i=1; i<=10; i++){
        console.log(i);
    }
}

// 8
function whileLoop(){
    let i = 10;
    while(i >= 1){
        console.log(i);
        i--;
    }
}

// 9
function mensaje(){
    return "Hola desde la función";
}
function mostrarFuncion(){
    alert(mensaje());
}

// 10
function suma(a,b){
    return a + b;
}
function sumarFuncion(){
    alert(suma(4,6));
}

// 11
function arreglo(){
    let arr = [1,2,3,4,5];
    console.log(arr[0]);
}

// 12
function recorrerArreglo(){
    let arr = [1,2,3,4,5];
    for(let i=0; i<arr.length; i++){
        console.log(arr[i]);
    }
}

// 13 - 14
function mostrarObjeto(){
    let persona = {
        nombre: "Josahany",
        edad: 21
    };
    console.log(persona.nombre);
}

// 16
function cambiarTexto(){
    document.getElementById("texto").innerText = "Texto cambiado";
}

// 17
function cambiarColor(){
    document.getElementById("texto").style.color = "pink";
}

// 18
function validarCampo(){
    let valor = document.getElementById("campo").value;
    if(valor == ""){
        alert("Campo vacío");
    } else {
        alert("Correcto");
    }
}

// 19
let count = 0;
function contador(){
    count++;
    document.getElementById("contador").innerText = count;
}

</script>

</body>
</html>
