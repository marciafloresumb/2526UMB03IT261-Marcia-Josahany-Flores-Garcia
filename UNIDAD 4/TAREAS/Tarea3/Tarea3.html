<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Ventas - Formulario</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa; /* Color de fondo gris claro para el dashboard */
            font-family: Arial, sans-serif;
            padding-top: 50px;
        }

        /* Estilo para la tarjeta principal del formulario */
        .card-ventas {
            border: 1px solid #cce5ff; /* Borde azul claro */
            border-radius: 10px; /* Bordes redondeados */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Sombra suave */
            background-color: #ffffff;
            overflow: hidden; /* Asegura que los hijos no se salgan */
            margin-bottom: 20px;
        }

        /* Estilo para el encabezado de la tarjeta */
        .card-header-ventas {
            padding: 15px 25px;
            background-color: #ffffff;
            border-bottom: 1px solid #eaeaea; /* Línea divisoria gris */
            display: flex;
            align-items: center;
        }

        /* El título de la tarjeta con estilo personalizado */
        .card-header-ventas .card-title {
            font-size: 24px;
            font-weight: bold;
            color: #0d3b66; /* Azul oscuro */
            margin: 0;
            margin-right: 15px; /* Espacio antes de la línea */
        }

        /* La línea azul decorativa a la derecha del título */
        .header-underline {
            height: 4px;
            width: 80px;
            background-color: #cfe2f3; /* Azul muy claro */
            border-radius: 2px;
        }

        /* Cuerpo de la tarjeta con padding */
        .card-body-ventas {
            padding: 25px;
        }

        /* Estilo para las etiquetas de los campos */
        .form-label {
            font-size: 14px;
            color: #555;
            font-weight: normal;
        }

        /* Estilo para los campos de entrada y menús desplegables */
        .form-control, .form-select {
            border-radius: 5px;
            border: 1px solid #ced4da;
            padding: 10px;
            font-size: 14px;
        }

        /* Estilo para los botones */
        .btn-custom {
            border-radius: 5px;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: 600;
        }

        /* Color específico para el botón de búsqueda */
        .btn-buscar {
            background-color: #198754; /* Verde Bootstrap 'success' */
            border: none;
            color: white;
        }

        .btn-buscar:hover {
            background-color: #157347;
        }

        /* Color específico para el botón de nuevo pedido */
        .btn-nuevo-pedido {
            background-color: #0d6efd; /* Azul Bootstrap 'primary' */
            border: none;
            color: white;
        }

        .btn-nuevo-pedido:hover {
            background-color: #0b5ed7;
        }

        /* Pequeño punto rojo decorativo que aparece en la imagen original */
        .red-dot-decor {
            position: absolute;
            left: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background-color: red;
            border-radius: 50%;
        }

        /* Barra decorativa inferior (footer) de la tarjeta */
        .card-footer-ventas {
            height: 25px;
            background-color: #cfe2f3; /* Azul muy claro */
            margin: 0 10px 10px 10px; /* Margen interior */
            border-radius: 5px;
        }

        /* Indicador de página en el pie de página principal */
        .footer-page-indicator {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card card-ventas">
            <div class="card-header-ventas">
                <h1 class="card-title">Ventas</h1>
                <div class="header-underline"></div>
            </div>

            <div class="card-body-ventas">
                <form>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="fechaPedido" class="form-label">Fecha de pedido</label>
                            <div class="input-group">
                                <input type="date" id="fechaPedido" class="form-control" value="2023-11-01">
                                <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="fechaEntrega" class="form-label">Fecha de entrega</label>
                            <div class="input-group position-relative">
                                <div class="red-dot-decor"></div>
                                <input type="date" id="fechaEntrega" class="form-control" value="2023-11-15">
                                <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label for="vendedor" class="form-label">Vendedor</label>
                            <select id="vendedor" class="form-select">
                                <option selected>Seleccione un vendedor</option>
                                <option value="1">Ana García</option>
                                <option value="2">Luis Pérez</option>
                                <option value="3">Carlos Rodríguez</option>
                            </select>
                        </div>
                    </div> <div class="row mb-4">
                        <div class="col-md-4">
                            <label for="producto" class="form-label">Producto</label>
                            <select id="producto" class="form-select">
                                <option selected>Seleccione un producto</option>
                                <option value="p1">Producto A - Lote 1</option>
                                <option value="p2">Producto B - Lote 2</option>
                                <option value="p3">Servicio de Mantenimiento</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="cliente" class="form-label">Cliente</label>
                            <select id="cliente" class="form-select">
                                <option selected>Seleccione un cliente</option>
                                <option value="c1">Tienda A - Sucursal Central</option>
                                <option value="c2">Empresa XYZ</option>
                                <option value="c3">Juan Pérez (Particular)</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label for="idPedido" class="form-label">ID Pedido</label>
                            <input type="text" id="idPedido" class="form-control" placeholder="ID de pedido (ej. V001)">
                        </div>
                    </div> <div class="d-flex justify-content-start gap-3">
                        <button type="submit" class="btn btn-custom btn-buscar d-flex align-items-center">
                            <i class="bi bi-search me-2"></i> Buscar
                        </button>
                        
                        <button type="button" class="btn btn-custom btn-nuevo-pedido d-flex align-items-center">
                            <i class="bi bi-plus-lg me-2"></i> Nuevo pedido
                        </button>
                    </div>

                </form>
            </div> <div class="card-footer-ventas"></div>
            
        </div> <div class="footer-page-indicator">
            [18]
        </div>

    </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
